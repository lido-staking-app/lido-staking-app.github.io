<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lido Staking - Decentralized DeFi Portal</title>
  <meta name="description" content="Secure, non-custodial portal for Lido Staking DeFi operations directly from your own wallet.">
  <link rel="canonical" href="https://lido-staking-app.github.io/">
  <meta name="robots" content="index,follow">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
  <style>


:root{
  --bg:#F7FAFD;
  --surface:#FFFFFF;
  --surface-soft:#F1F7FC;
  --ink:#0D1014;
  --muted:#64717F;
  --faint:#9AA7B5;
  --accent:#00A3FF;
  --accent-strong:#008FE3;
  --accent-soft:rgba(0,163,255,.11);
  --line:rgba(13,16,20,.09);
  --line-strong:rgba(13,16,20,.16);
  --shadow:0 28px 70px -34px rgba(13,16,20,.36);
  --max:1080px;
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  min-height:100dvh;
  overflow:hidden;
  color:var(--ink);
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  line-height:1.5;
  background:
    linear-gradient(90deg, rgba(0,163,255,.08) 0 1px, transparent 1px 100%),
    radial-gradient(48% 44% at 16% 18%, rgba(0,163,255,.12), transparent 60%),
    var(--bg);
  background-size:72px 72px, auto, auto;
  -webkit-font-smoothing:antialiased;
  display:flex;
  flex-direction:column;
}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
h1,p{margin:0}
h1{
  font-size:clamp(3rem,6.4vw,5.85rem);
  line-height:.95;
  letter-spacing:0;
  font-weight:800;
}

.topbar{
  width:100%;
  display:flex;
  align-items:center;
  gap:18px;
  padding:18px clamp(18px,4vw,42px);
}
.brand{
  display:inline-flex;
  align-items:center;
  gap:10px;
  min-width:0;
  color:var(--ink);
  font-size:1.04rem;
  font-weight:800;
}
.brand img{
  width:30px;
  height:30px;
  border-radius:50%;
  box-shadow:0 10px 22px -14px rgba(0,163,255,.8);
}
.nav{
  display:flex;
  align-items:center;
  gap:24px;
  margin-left:10px;
}
.nav a{
  color:var(--muted);
  font-size:.93rem;
  font-weight:560;
  white-space:nowrap;
  transition:color .16s ease;
}
.nav a:hover{color:var(--ink)}
.spacer{flex:1}
.ghost{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:40px;
  padding:0 18px;
  border:1px solid var(--line-strong);
  border-radius:999px;
  background:rgba(255,255,255,.74);
  color:var(--ink);
  font-size:.92rem;
  font-weight:750;
  box-shadow:0 14px 32px -28px rgba(13,16,20,.34);
  transition:transform .14s ease,border-color .16s ease,background .16s ease;
}
.ghost:hover{
  transform:translateY(-1px);
  border-color:rgba(0,163,255,.44);
  background:#fff;
}

.stage{
  flex:1;
  width:100%;
  display:grid;
  place-items:center;
  padding:8px clamp(18px,4vw,42px) 10px;
}
.hero{
  width:min(var(--max),100%);
  display:grid;
  grid-template-columns:minmax(0,1fr) minmax(350px,430px);
  align-items:center;
  gap:clamp(28px,6vw,76px);
}
.copy{
  position:relative;
  min-width:0;
  padding-left:24px;
}
.copy:before{
  content:"";
  position:absolute;
  left:0;
  top:6px;
  bottom:8px;
  width:4px;
  border-radius:999px;
  background:var(--accent);
}
.eyebrow{
  display:block;
  margin-bottom:16px;
  color:var(--accent-strong);
  font-size:.78rem;
  font-weight:800;
  letter-spacing:.12em;
  text-transform:uppercase;
}
.sub{
  max-width:48ch;
  margin-top:20px;
  color:var(--muted);
  font-size:clamp(1.02rem,1.35vw,1.18rem);
}
.sub strong{
  color:var(--ink);
  font-weight:800;
}

.card{
  width:100%;
  border:1px solid var(--line);
  border-radius:28px;
  background:linear-gradient(180deg,#fff 0%,#fbfdff 100%);
  box-shadow:var(--shadow);
  padding:22px;
}
.card-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  margin-bottom:18px;
  color:var(--ink);
  font-size:1rem;
  font-weight:800;
}
.status{
  color:var(--faint);
  font-size:.78rem;
  font-weight:750;
}
.route{
  display:grid;
  grid-template-columns:minmax(0,1fr) 44px minmax(0,1fr);
  align-items:center;
  gap:12px;
}
.leg{
  min-width:0;
  border:1px solid var(--line);
  border-radius:18px;
  background:var(--surface-soft);
  padding:16px;
}
.label{
  display:block;
  color:var(--faint);
  font-size:.7rem;
  font-weight:800;
  letter-spacing:.1em;
  text-transform:uppercase;
}
.chip{
  display:flex;
  align-items:center;
  gap:10px;
  min-height:34px;
  margin-top:10px;
}
.icon{
  width:28px;
  height:28px;
  border-radius:50%;
  flex:none;
}
.token{
  min-width:0;
  overflow:hidden;
  color:var(--ink);
  font-size:1.08rem;
  font-weight:850;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.switch{
  width:44px;
  height:44px;
  border:1px solid rgba(0,163,255,.28);
  border-radius:50%;
  background:#fff;
  color:var(--accent);
  cursor:pointer;
  display:grid;
  place-items:center;
  box-shadow:0 16px 34px -26px rgba(0,163,255,.7);
  transition:transform .16s ease,background .16s ease,border-color .16s ease;
}
.switch:hover{
  transform:translateY(-1px);
  background:var(--accent-soft);
  border-color:rgba(0,163,255,.48);
}
.arrow{
  font-size:1.08rem;
  line-height:1;
}
.primary{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  width:100%;
  min-height:54px;
  margin-top:18px;
  border-radius:17px;
  background:var(--accent);
  color:#fff;
  font-size:1.06rem;
  font-weight:850;
  box-shadow:0 18px 36px -26px rgba(0,163,255,.95);
  transition:transform .14s ease,background .16s ease,box-shadow .16s ease;
}
.primary:hover{
  transform:translateY(-1px);
  background:var(--accent-strong);
  box-shadow:0 22px 42px -26px rgba(0,143,227,.95);
}

.foot{
  padding:12px 24px 20px;
  color:var(--faint);
  text-align:center;
  font-size:.85rem;
  font-weight:650;
}

@media(max-width:720px){
  body{
    background:
      radial-gradient(90% 36% at 50% 0%, rgba(0,163,255,.12), transparent 66%),
      var(--bg);
  }
  .topbar{
    padding:14px 16px;
    gap:10px;
  }
  .brand span{font-size:1rem}
  .nav{display:none}
  .ghost{
    min-height:38px;
    padding:0 14px;
    font-size:.88rem;
  }
  .stage{
    align-items:start;
    padding:8px 16px 6px;
  }
  .hero{
    grid-template-columns:1fr;
    gap:20px;
    text-align:center;
    min-width:0;
  }
  .copy{
    padding-left:0;
  }
  .copy:before{display:none}
  .eyebrow{
    margin-bottom:10px;
    font-size:.68rem;
  }
  h1{
    font-size:clamp(2.34rem,10.8vw,2.86rem);
    line-height:1;
    max-width:100%;
  }
  .sub{
    max-width:31ch;
    margin:12px auto 0;
    font-size:.94rem;
    line-height:1.48;
  }
  .card{
    border-radius:22px;
    padding:16px;
  }
  .card-head{
    margin-bottom:12px;
    font-size:.95rem;
  }
  .route{
    grid-template-columns:1fr;
    gap:9px;
  }
  .leg{
    padding:13px 14px;
    text-align:left;
  }
  .chip{
    margin-top:7px;
    min-height:30px;
  }
  .icon{
    width:26px;
    height:26px;
  }
  .token{font-size:1rem}
  .switch{
    width:38px;
    height:38px;
    justify-self:center;
  }
  .arrow{
    transform:rotate(90deg);
  }
  .primary{
    min-height:50px;
    margin-top:12px;
    border-radius:15px;
    font-size:1rem;
  }
  .foot{
    padding:8px 16px 12px;
    font-size:.78rem;
  }
}

@media(max-width:380px){
  .topbar{padding-top:12px;padding-bottom:10px}
  h1{font-size:2.48rem}
  .sub{font-size:.9rem}
  .card{padding:14px}
  .leg{padding:11px 12px}
  .primary{min-height:48px}
}


  
.footer {
  text-align: center !important;
}
  </style>
</head>

    <div class="brand">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>Lido Staking</span>

    <span class="spacer"></span>
    <nav class="nav" aria-label="Main Navigation">
      <a href="how-it-works/">How it works</a>
      <a href="faq/">FAQ</a>
      <a href="about/">About</a>
      <a href="security/">Security</a>

  </header>
  <main class="stage" style="padding: 100px 24px; text-align: center; max-width: 800px; margin: 0 auto;">

  </main>
  <footer class="footer">Lido Staking &mdash; 2026</footer>
</body>
</html>
